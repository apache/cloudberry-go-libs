name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened, edited ]
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: '1.25'

jobs:
  ci:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [test, build]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true
        
    - name: Download dependencies
      run: make depend
      
    - name: Run CI target
      env:
        CI_TARGET: ${{ matrix.target }}
      run: |
        set +e
        case "${CI_TARGET}" in
          test)
            echo "Running tests..."
            make unit 2>&1 | tee test_output.txt
            TEST_EXIT_CODE=${PIPESTATUS[0]}
            
            if [ ${TEST_EXIT_CODE} -eq 0 ]; then
              echo "Generating code coverage report..."
              make coverage 2>&1 | tee coverage_output.txt || true
            fi
            
            # Generate test summary
            {
              echo "## Test Results"
              if [ ${TEST_EXIT_CODE} -eq 0 ]; then
                echo "PASS: All tests passed successfully!"
                echo ""
                
                if [ -f test_output.txt ]; then
                  echo "### Test Execution Summary"
                  echo "\`\`\`"
                  tail -n 10 test_output.txt | grep -E "(Ginkgo ran|Test Suite)" || echo "Test summary not found"
                  echo "\`\`\`"
                  echo ""
                fi
                
                echo "### Code Coverage Report"
                echo "\`\`\`"
                if [ -f coverage_output.txt ]; then
                  cat coverage_output.txt
                else
                  echo "Coverage report not available"
                fi
                echo "\`\`\`"
              else
                echo "FAIL: Some tests failed. Check the logs above for details."
                echo ""
                if [ -f test_output.txt ]; then
                  echo "### Test Output"
                  echo "\`\`\`"
                  tail -n 20 test_output.txt
                  echo "\`\`\`"
                fi
              fi
            } >> "$GITHUB_STEP_SUMMARY"
            
            exit ${TEST_EXIT_CODE}
            ;;
            
          build)
            echo "Building..."
            go build -v ./...
            BUILD_EXIT_CODE=$?
            
            # Generate build summary
            {
              echo "## Build Results"
              if [ ${BUILD_EXIT_CODE} -eq 0 ]; then
                echo "PASS: Build completed successfully!"
              else
                echo "FAIL: Build failed. Check the logs above for details."
              fi
            } >> "$GITHUB_STEP_SUMMARY"
            
            exit ${BUILD_EXIT_CODE}
            ;;
            
          *)
            echo "Unknown CI target: ${CI_TARGET}"
            exit 1
            ;;
        esac
